<!-- ════════════════════════════════════════════════════════
     貼入活動行事曆 HTML 的兩個位置：

     位置 A：導覽列 <nav> 內（在 nav-stats 之後加）
     ════════════════════════════════════════════════════════
<button class="nav-btn" onclick="switchPage('notifications')" id="nav-notifications">
  <i class="fas fa-bell"></i>通知
</button>

     位置 B：最後一個 .page div 之後貼入整個下面的區塊
     ════════════════════════════════════════════════════════ -->


<!-- ════════════ 通知管理頁 ════════════ -->
<div id="page-notifications" class="page">

  <!-- iOS 提示 banner（使用者是 iOS 且尚未安裝到主畫面時顯示） -->
  <div id="ios-hint" style="display:none;
    background:#EAF3DE; border:1px solid #97C459; border-radius:8px;
    padding:12px 16px; margin-bottom:16px; font-size:13px; color:#27500A; line-height:1.6">
    <strong>iPhone 使用者注意：</strong>請先點 Safari 右下角分享鍵 → 「加入主畫面」，
    才能接收推播通知。加入後重新開啟即可啟用。
  </div>

  <!-- 通知授權狀態提示 -->
  <div id="notif-status-bar" style="
    border-radius:8px; padding:10px 14px; margin-bottom:16px;
    font-size:13px; line-height:1.5; display:none">
  </div>

  <!-- ── 區塊 1：每日定時 ── -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><div class="title-text-wrapper">每日定時提醒</div></div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px">
      <div>
        <div style="font-size:14px; font-weight:600; color:var(--text)">啟用每日推播</div>
        <div style="font-size:12px; color:var(--text3); margin-top:2px">每天在指定時間提醒所有使用者打卡</div>
      </div>
      <label style="position:relative; display:inline-block; width:42px; height:24px; cursor:pointer">
        <input type="checkbox" id="daily-enabled" style="opacity:0;width:0;height:0"
               onchange="onDailyToggle()">
        <span id="daily-toggle-track" style="
          position:absolute; inset:0; border-radius:12px;
          background:var(--border); transition:.2s">
          <span id="daily-toggle-dot" style="
            position:absolute; top:3px; left:3px; width:18px; height:18px;
            background:#fff; border-radius:50%; transition:.2s"></span>
        </span>
      </label>
    </div>

    <div id="daily-settings" style="display:none; border-top:1px solid var(--border); padding-top:14px">
      <div class="form-row">
        <div class="form-group" style="flex:0 0 130px">
          <label>推播時間</label>
          <input type="time" id="daily-time" value="08:00">
        </div>
        <div class="form-group" style="flex:1">
          <label>通知訊息</label>
          <input type="text" id="daily-message" placeholder="記得今日打卡！" maxlength="50">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:4px"
              onclick="saveDailyConfig()">儲存定時設定</button>
    </div>
  </div>

  <!-- ── 區塊 2：預約通知 ── -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center">
      <div class="title-text-wrapper">預約通知</div>
      <button class="btn btn-secondary btn-sm" onclick="openScheduleModal()">＋ 新增</button>
    </div>

    <div id="scheduled-list" style="margin-top:4px">
      <!-- 由 JS 動態填入 -->
      <div style="font-size:13px; color:var(--text3); padding:8px 0">尚未設定預約通知</div>
    </div>
  </div>

  <!-- ── 區塊 3：臨時通知 ── -->
  <div class="card">
    <div class="card-title"><div class="title-text-wrapper">臨時通知</div></div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:10px">
      立即推播給所有已安裝自律打卡的成員
    </div>
    <textarea id="instant-message" rows="3" placeholder="輸入要立即推送的訊息..."
      style="width:100%; border:1px solid var(--border); border-radius:8px;
             padding:10px 12px; font-size:14px; resize:none; font-family:inherit;
             color:var(--text); background:var(--surface)"></textarea>
    <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content:center"
            onclick="sendInstantMsg()">
      <i class="fas fa-paper-plane" style="margin-right:6px"></i>立即推播給所有成員
    </button>
  </div>
</div>

<!-- ── 預約通知 Modal ── -->
<div id="schedule-modal" class="modal-overlay">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">新增預約通知</div>
      <button class="close-btn" onclick="closeScheduleModal()">✕</button>
    </div>

    <div class="form-group">
      <label>通知標題</label>
      <input type="text" id="sch-title" placeholder="例：神鼓陣課程提醒" maxlength="30">
    </div>
    <div class="form-group">
      <label>通知訊息</label>
      <textarea id="sch-message" rows="2" placeholder="例：今天下午 2 點在內湖館集合，請準時到場"
        style="border:1px solid var(--border); border-radius:8px; padding:10px 12px;
               font-size:14px; resize:none; font-family:inherit; width:100%;
               color:var(--text); background:var(--surface)"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>日期</label>
        <input type="date" id="sch-date">
      </div>
      <div class="form-group" style="flex:0 0 130px">
        <label>時間</label>
        <input type="time" id="sch-time" value="09:00">
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:8px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeScheduleModal()">取消</button>
      <button class="btn btn-primary"   style="flex:1" onclick="saveSchedule()">儲存</button>
    </div>
  </div>
</div>


<!-- ════════════ 通知頁 JavaScript ════════════ -->
<script type="module">
import {
  initNotifications, saveDailySettings, addScheduled,
  deleteScheduled, sendInstant, loadSettings
} from './notification-manager.js';

// 頁面載入後初始化（需登入才執行）
window._initNotifPage = async function() {
  // iOS 提示
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    document.getElementById('ios-hint').style.display = 'block';
  }

  // 初始化通知（申請授權、註冊 SW）
  const ok = await initNotifications();
  showStatusBar(ok);

  // 讀取目前設定並填入 UI
  const cfg = await loadSettings();
  fillDailyUI(cfg);
  renderScheduledList(cfg.scheduled || []);
};

function showStatusBar(granted) {
  const bar = document.getElementById('notif-status-bar');
  bar.style.display = 'block';
  if (granted) {
    bar.style.background = '#EAF3DE';
    bar.style.border = '1px solid #97C459';
    bar.style.color = '#27500A';
    bar.textContent = '通知已啟用。設定後所有已安裝自律打卡的成員將收到推播。';
  } else {
    bar.style.background = '#FFF3CD';
    bar.style.border = '1px solid #FFCA2C';
    bar.style.color = '#664D03';
    bar.textContent = '通知授權未開啟。請至瀏覽器設定允許「自律動起來」的通知。';
  }
}

function fillDailyUI(cfg) {
  const cb = document.getElementById('daily-enabled');
  cb.checked = !!cfg.dailyEnabled;
  if (cfg.dailyTime) document.getElementById('daily-time').value = cfg.dailyTime;
  if (cfg.dailyMessage) document.getElementById('daily-message').value = cfg.dailyMessage;
  updateDailyToggle(cb.checked);
}

window.onDailyToggle = function() {
  const checked = document.getElementById('daily-enabled').checked;
  updateDailyToggle(checked);
};

function updateDailyToggle(on) {
  const track = document.getElementById('daily-toggle-track');
  const dot   = document.getElementById('daily-toggle-dot');
  track.style.background = on ? 'var(--accent)' : 'var(--border)';
  dot.style.transform = on ? 'translateX(18px)' : 'translateX(0)';
  document.getElementById('daily-settings').style.display = on ? 'block' : 'none';
}

window.saveDailyConfig = async function() {
  const enabled = document.getElementById('daily-enabled').checked;
  const time    = document.getElementById('daily-time').value;
  const message = document.getElementById('daily-message').value || '記得今日打卡！';
  await saveDailySettings({ enabled, time, message });
  if (typeof showToast === 'function') showToast('✅ 每日定時設定已儲存');
};

// 預約通知列表渲染
function renderScheduledList(items) {
  const el = document.getElementById('scheduled-list');
  if (!items.length) {
    el.innerHTML = '<div style="font-size:13px; color:var(--text3); padding:8px 0">尚未設定預約通知</div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const d = new Date(item.datetime);
    const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div style="display:flex; align-items:center; gap:12px; padding:10px 0;
                  border-bottom:1px solid var(--border)">
        <div style="width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:13px; font-weight:600; color:var(--text)">${escHtml(item.title)}</div>
          <div style="font-size:12px; color:var(--text3)">${dateStr}　${timeStr}</div>
        </div>
        <button onclick="removeSchedule('${item.id}')"
          style="border:none; background:none; cursor:pointer; color:var(--text3); font-size:18px; padding:0 4px">
          <i class="fas fa-trash-alt" style="font-size:14px"></i>
        </button>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.openScheduleModal = function() {
  document.getElementById('schedule-modal').classList.add('open');
  document.getElementById('sch-date').valueAsDate = new Date();
};
window.closeScheduleModal = function() {
  document.getElementById('schedule-modal').classList.remove('open');
};

window.saveSchedule = async function() {
  const title    = document.getElementById('sch-title').value.trim();
  const message  = document.getElementById('sch-message').value.trim();
  const date     = document.getElementById('sch-date').value;
  const time     = document.getElementById('sch-time').value;
  if (!title || !message || !date || !time) {
    if (typeof showToast === 'function') showToast('請填寫所有欄位');
    return;
  }
  await addScheduled({ title, message, datetime: `${date}T${time}` });
  closeScheduleModal();
  const cfg = await loadSettings();
  renderScheduledList(cfg.scheduled || []);
  if (typeof showToast === 'function') showToast('✅ 預約通知已新增');
};

window.removeSchedule = async function(id) {
  await deleteScheduled(id);
  const cfg = await loadSettings();
  renderScheduledList(cfg.scheduled || []);
  if (typeof showToast === 'function') showToast('已刪除');
};

window.sendInstantMsg = async function() {
  const msg = document.getElementById('instant-message').value.trim();
  if (!msg) { if (typeof showToast === 'function') showToast('請輸入訊息'); return; }
  await sendInstant(msg);
  document.getElementById('instant-message').value = '';
  if (typeof showToast === 'function') showToast('✅ 已推播給所有成員');
};
</script>
