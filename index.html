<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>點名管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f0eb;
    --border: #e6e3dc;
    --text: #2c2a27;
    --text2: #5c5852;
    --text3: #9c968f;
    --accent: #2c5234;
    --accent-light: #f0f4f1;
    --accent2: #b8621d;
    --accent2-light: #faf2eb;
    --accent3: #0f9d58;
    --accent3-light: #e8f5e9;
    --red: #96352b;
    --red-light: #f9ebea;
    --yellow: #b58900;
    --yellow-light: #fbf7eb;
    --blue: #1a73e8;
    --blue-light: #e8eef7;
    --purple: #8e44ad;
    --purple-light: #f3e5f5;
    --radius: 6px;
    --shadow: 0 4px 20px rgba(44,42,39,0.04), 0 1px 3px rgba(44,42,39,0.02);
    --shadow-sm: 0 2px 8px rgba(44,42,39,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }

  /* ── NAV ── */
  nav {
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    width: 100%;
    transform: scale(1);
    transform-origin: bottom center;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-around; gap: 0;
    padding: 8px 0 12px; 
    scrollbar-width: none;
    max-width: 760px; margin: 0 auto;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 0;
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    border: none; background: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.25s ease;
    flex: 1;
    min-width: 0;
    touch-action: manipulation;
  }
  .nav-btn i { 
    display: inline-block;
    font-size: 18px;
    color: var(--text2);
    transition: all 0.25s ease;
    line-height: 1;
  }
  .nav-btn.active i { 
    color: var(--accent); 
  }
  .nav-btn.active { color: var(--accent); font-weight: 600; }

  /* ── PAGES ── */
  .page { display: none; padding: 82px 20px 80px; max-width: 760px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 14px; font-weight: 700;
    color: var(--text); letter-spacing: 0.08em;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title::before {
    content: ''; display: inline-block; width: 3px; height: 14px;
    background: var(--accent); margin-right: 8px; border-radius: 2px;
  }
  .title-text-wrapper { flex: 1; display: flex; align-items: center; }

  /* ── DASHBOARD STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .stat-num {
    font-size: 28px; font-weight: 700;
    font-family: 'Roboto', 'Noto Sans TC', sans-serif;
    line-height: 1; color: var(--text);
  }
  .stat-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-top: 8px; letter-spacing: 0.05em; }
  .stat-card.green .stat-num { color: var(--accent); }
  .stat-card.orange .stat-num { color: var(--accent2); }
  .stat-card.red .stat-num { color: var(--red); }

  /* ── FILTER TABS ── */
  .filter-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 13px; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
  }
  .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 14px; font-weight: 500;
    border: 1px solid var(--border); cursor: pointer;
    background: var(--surface); color: var(--text);
    transition: all 0.2s ease; white-space: nowrap;
    touch-action: manipulation;
  }
  .btn:hover { background: var(--surface2); border-color: #d1cdc5; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #203d27; border-color: #203d27; }
  .btn-primary:active { transform: scale(0.97); box-shadow: inset 0 2px 4px rgba(0,0,0,0.15); }
  .btn-secondary { background: var(--bg); color: var(--text2); }
  .btn-danger { background: var(--surface); color: var(--red); border-color: var(--border); }
  .btn-danger:hover { background: var(--red-light); border-color: var(--red); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-block { width: 100%; }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: inherit; font-weight: 400;
    background: var(--surface); color: var(--text);
    transition: all 0.2s ease;
  }
  select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%235c5852' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat: no-repeat; background-position: right 12px center; background-size: 14px;
    padding-right: 36px; appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

  .radio-group { display: flex; gap: 16px; padding: 10px 0; }
  .radio-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); cursor: pointer; }
  .radio-label input { width: auto; margin: 0; }

  /* ── MEMBER LIST ── */
  .member-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 12px; border-bottom: 1px solid var(--border);
  }
  .member-item:last-child { border-bottom: none; }
  .num-badge {
    width: 28px; height: 28px; border-radius: 4px;
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Roboto', sans-serif; font-weight: 500; font-size: 13px; flex-shrink: 0;
  }
  .member-info { flex: 1.4; min-width: 0; }
  .member-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; white-space: nowrap; }
  .member-meta { font-size: 13px; color: var(--text3); margin-top: 2px; font-family: 'Roboto', 'Noto Sans TC', sans-serif; }
  .course-badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
    background: var(--accent-light); color: var(--accent); border: 1px solid rgba(44,82,52,0.15);
    white-space: nowrap;
  }
  .role-badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  .role-badge-leader { background: rgba(44, 82, 52, 0.1); color: var(--accent); border-color: rgba(44, 82, 52, 0.2); }
  .role-badge-other { background: rgba(58, 135, 173, 0.1); color: #3a87ad; border-color: rgba(58, 135, 173, 0.2); }

  /* ── ICON STYLE ── */
  .user-avatar-star {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--bg); flex-direction: column;
  }
  .login-card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow); padding: 40px 30px;
    max-width: 360px; width: 100%; text-align: center;
  }
  .login-logo {
    font-size: 48px; margin-bottom: 20px;
  }
  .login-title {
    font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text);
  }
  .login-sub {
    font-size: 14px; color: var(--text2); margin-bottom: 32px;
  }
  .login-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px 24px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; width: 100%;
  }
  .login-btn:hover { background: #203d27; }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 99;
    background: var(--surface); border-bottom: 0.5px solid var(--border);
    padding: 16px 20px; max-width: 800px; margin: 0 auto; display: flex;
    align-items: center; justify-content: space-between; width: 100%;
  }
  .header-left {
    display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
  }
  .header-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .header-title {
    display: flex; flex-direction: column; gap: 2px; min-width: 0;
  }
  .header-title-main {
    font-size: 14px; font-weight: 700; color: var(--text);
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }
  .header-title-sub {
    font-size: 12px; color: var(--text3);
  }
  .logout-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    background: #f0f0f0; border: none; border-radius: var(--radius);
    cursor: pointer; color: var(--text); transition: all 0.2s;
  }
  .logout-btn:hover { background: #e0e0e0; }

  /* ── SESSION MODAL ── */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; }
  .modal-overlay.show { display: flex; align-items: center; justify-content: center; }
  .modal-content {
    background: var(--surface); border-radius: 12px;
    padding: 24px; max-width: 500px; width: 90%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; font-size: 20px;
    color: var(--text2); cursor: pointer;
  }

  /* ── CALENDAR ── */
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 8px; margin-bottom: 24px;
  }
  .calendar-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .calendar-cell.today { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .calendar-cell.selected { background: var(--accent); color: #fff; font-weight: 700; }
  .calendar-cell:hover { background: var(--surface2); }

  /* ── SESSION LIST ── */
  .session-item {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; background: var(--surface2); border-radius: var(--radius);
    margin-bottom: 12px; cursor: pointer; transition: all 0.2s;
  }
  .session-item:hover { background: var(--border); }
  .session-date { font-weight: 700; font-size: 14px; color: var(--accent); min-width: 50px; }
  .session-info { flex: 1; }
  .session-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .session-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .session-actions { display: flex; gap: 8px; }

  /* ── POPOVER ── */
  .popover {
    position: fixed; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); min-width: 110px; z-index: 999;
    display: none;
  }
  .popover.show { display: block; }
  .popover-item {
    padding: 10px 16px; font-size: 13px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }
  .popover-item:last-child { border-bottom: none; }
  .popover-item:hover { background: var(--surface2); }
  .popover-item.danger { color: var(--red); }

  /* ── ACTION BUTTON GROUP ── */
  .action-group { display: flex; gap: 8px; }

  /* ── DISABLED STATE ── */
  .btn:disabled, .btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── TABLE ── */
  .table-wrapper { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  th {
    background: var(--surface2); padding: 12px; text-align: left;
    font-weight: 700; color: var(--text); border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px; border-bottom: 1px solid var(--border);
  }
  tr:hover { background: var(--surface2); }

  /* ── STATS ── */
  .stats-container {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 24px;
  }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .stat-value {
    font-size: 32px; font-weight: 700;
    font-family: 'Roboto', 'Noto Sans TC', sans-serif;
    color: var(--accent); line-height: 1;
  }
  .stat-label {
    font-size: 13px; color: var(--text2); margin-top: 8px;
  }

  /* ── SESSION POPOVER ── */
  .session-popover {
    position: fixed; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); min-width: 120px; z-index: 999;
    display: none;
  }
  .session-popover.show { display: block; }
  .session-popover-item {
    padding: 10px 16px; font-size: 13px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }
  .session-popover-item:last-child { border-bottom: none; }
  .session-popover-item:hover { background: var(--surface2); }
  .session-popover-item.danger { color: var(--red); }

  /* ── MEMBER POPOVER ── */
  .member-popover {
    position: fixed; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); min-width: 100px; z-index: 999;
    display: none;
  }
  .member-popover.show { display: block; }
  .member-popover-item {
    padding: 10px 16px; font-size: 13px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }
  .member-popover-item:last-child { border-bottom: none; }
  .member-popover-item:hover { background: var(--surface2); }
  .member-popover-item.danger { color: var(--red); }

  /* ── SESSION DETAIL PANEL ── */
  #session-detail-panel {
    background: var(--surface2); border-radius: var(--radius);
    padding: 20px; margin-bottom: 24px; display: none;
  }
  .sdp-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .sdp-title {
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .sdp-meta {
    font-size: 13px; color: var(--text2); margin-top: 4px;
  }
  .sdp-stats {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .sdp-badge {
    display: inline-block; padding: 4px 12px; border-radius: 10px;
    font-size: 12px; font-weight: 600;
  }
  .sdp-badge.present {
    background: var(--accent-light); color: var(--accent);
  }
  .sdp-badge.leave {
    background: var(--red-light); color: var(--red);
  }
  .sdp-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--surface);
    border-radius: var(--radius); margin-bottom: 8px;
  }
  .sdp-row-name {
    font-weight: 600; font-size: 14px; color: var(--text); flex: 1;
  }
  .sdp-row-meta {
    font-size: 12px; color: var(--text2);
  }

  /* ── FILTER SECTION ── */
  .filter-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 24px;
  }
  .filter-title {
    font-size: 13px; font-weight: 700; color: var(--text);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .filter-dropdowns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .filter-dropdown {
    width: 100%;
  }

  /* ── COLOR PICKER ── */
  .color-options {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .color-opt {
    width: 28px; height: 28px; border-radius: 4px;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.2s;
  }
  .color-opt.selected {
    border-color: var(--text); box-shadow: 0 0 0 2px var(--surface);
  }

  /* ── SESSION DATE CHIPS ── */
  .session-date-chips {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .session-date-chip {
    padding: 8px 14px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; color: var(--text2); cursor: pointer;
    transition: all 0.2s;
  }
  .session-date-chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .session-date-chip:hover {
    background: var(--surface2);
  }

  /* ── STATS TABLE ── */
  .stats-table-wrapper {
    overflow-x: auto; margin-bottom: 24px;
  }
  .stats-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .stats-table th {
    background: var(--surface2); padding: 12px 8px; text-align: center;
    font-weight: 700; color: var(--text); border: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .stats-table td {
    padding: 10px 8px; text-align: center;
    border: 1px solid var(--border);
  }
  .stats-table tr:nth-child(odd) { background: rgba(0,0,0,0.01); }
  .stats-table tr:hover { background: var(--surface2); }
  .stats-cell-center { text-align: center; }
  .col-stats-name { text-align: left; }
  .col-stats-id { width: 80px; }
  .col-stats-hall { width: 60px; }
  .col-stats-course { width: 80px; }
  .col-stats-role { width: 70px; }
  .col-stats-rate { width: 60px; font-weight: 700; }
  .rate-cell-val { display: block; }
  .rate-cell-sub { display: block; font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 2px; }

  /* ── ATTACHMENT ── */
  .attachment-list {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .attachment-item {
    display: inline-block; padding: 4px 8px;
    background: var(--surface2); border-radius: 4px;
    font-size: 12px; color: var(--text);
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">✨</div>
    <div class="login-title">點名管理系統</div>
    <div class="login-sub">使用 Google 帳號登入</div>
    <button class="login-btn" onclick="googleLogin()">
      <i class="fas fa-google"></i> 使用 Google 登入
    </button>
  </div>
</div>

<div id="app-container" style="display: none;">
  <header>
    <div class="header-left">

      <select id="m-course">

<div id="session-popover-main" class="session-popover">
  <div class="session-popover-item" onclick="openEditSessionModal()">編輯</div>
  <div class="session-popover-item" onclick="duplicateSession()">複製</div>
  <div class="session-popover-item danger" onclick="deleteSession()">刪除</div>
</div>

<div id="member-popover-main" class="member-popover">
  <div class="member-popover-item" onclick="openEditMemberModal()">編輯</div>
  <div class="member-popover-item danger" onclick="deleteMember()">刪除</div>
</div>

<script>
let DB = { members: [], sessions: [], records: {} };
let currentUser = null;
let isAdmin = false;
let selectedSessionId = null;
let selectedMemberId = null;

// ============ PAGE SWITCHING ============
function switchPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageName).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + pageName).classList.add('active');
}

// ============ MODAL ============
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ============ UTILITIES ============
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }); }

// ============ SESSIONS ============
function generateMonthTabs() {
  const year = parseInt(document.getElementById('year-filter').value);
  const now = new Date();
  const tabs = [];
  for (let m = 1; m <= 12; m++) {
    const d = new Date(year, m-1, 1);
    const label = d.toLocaleDateString('zh-TW', { month: 'short', year: 'numeric' });
    const isActive = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    tabs.push(`<button class="filter-tab ${isActive ? 'active' : ''}" data-month="${m}" onclick="filterByMonth(${m})">${label}</button>`);
  }
  document.getElementById('month-tabs').innerHTML = tabs.join('');
}

function filterByMonth(m) {
  document.querySelectorAll('#month-tabs .filter-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  updateSessionList();
}

function updateSessionList() {
  const year = parseInt(document.getElementById('year-filter').value);
  const course = document.getElementById('course-filter').value;
  const activeMonth = document.querySelector('#month-tabs .filter-tab.active');
  const month = activeMonth ? parseInt(activeMonth.dataset.month) : new Date().getMonth() + 1;

  const filtered = DB.sessions.filter(s => {
    const d = new Date(s.date);
    return d.getFullYear() === year && d.getMonth() + 1 === month && (!course || s.courseType === course);
  }).sort((a, b) => new Date(a.date) - new Date(b.date));

  const html = filtered.map(s => {
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
    const actions = isAdmin ? `
      <div class="action-group" onclick="event.stopPropagation();">
        <button class="btn btn-sm" onclick="selectedSessionId='${s.id}'; toggleSessionPopover(event, 'session-popover-main')">⋯</button>
      </div>
    ` : '';
    return `
      <div class="session-item" onclick="toggleSessionDetail('${s.id}')">
        <div class="session-date">${dateStr}</div>
        <div class="session-info">
          <div class="session-name">${esc(s.name)}</div>
          <div class="session-time">${s.timeStart || ''}</div>
        </div>
        ${actions}
      </div>
    `;
  }).join('');

  document.getElementById('sessions-list').innerHTML = html || '<div style="color:var(--text3); padding:20px; text-align:center;">沒有活動</div>';
  document.getElementById('session-stats').innerHTML = `<span style="font-size:13px; color:var(--text2);">${filtered.length}</span>`;
}

function openAddSessionModal() {
  document.getElementById('s-name').value = '';
  document.getElementById('s-date').value = '';
  document.getElementById('s-time-start').value = '';
  document.getElementById('s-time-end').value = '';
  document.getElementById('s-course').value = '神鼓陣';
  document.getElementById('s-color').value = '#2c5234';
  openModal('session-modal');
}

function saveSession() {
  const name = document.getElementById('s-name').value.trim();
  const date = document.getElementById('s-date').value;
  const timeStart = document.getElementById('s-time-start').value;
  const timeEnd = document.getElementById('s-time-end').value;
  const courseType = document.getElementById('s-course').value;
  const color = document.getElementById('s-color').value;

  if (!name || !date) { alert('請填入活動名稱和日期'); return; }

  const session = {
    id: uuid(),
    name, date, timeStart, timeEnd, courseType, color,
    createdAt: new Date().toISOString()
  };

  DB.sessions.push(session);
  closeModal('session-modal');
  updateSessionList();
}

function openEditSessionModal() {
  if (!selectedSessionId) return;
  const s = DB.sessions.find(x => x.id === selectedSessionId);
  if (!s) return;
  document.getElementById('s-name').value = s.name;
  document.getElementById('s-date').value = s.date;
  document.getElementById('s-time-start').value = s.timeStart || '';
  document.getElementById('s-time-end').value = s.timeEnd || '';
  document.getElementById('s-course').value = s.courseType;
  document.getElementById('s-color').value = s.color;
  
  const modalTitle = document.querySelector('#session-modal .modal-title');
  modalTitle.textContent = '編輯活動';
  
  const saveBtn = document.querySelector('#session-modal .btn-primary');
  saveBtn.onclick = function() {
    const name = document.getElementById('s-name').value.trim();
    const date = document.getElementById('s-date').value;
    const timeStart = document.getElementById('s-time-start').value;
    const timeEnd = document.getElementById('s-time-end').value;
    const courseType = document.getElementById('s-course').value;
    const color = document.getElementById('s-color').value;

    if (!name || !date) { alert('請填入活動名稱和日期'); return; }

    s.name = name;
    s.date = date;
    s.timeStart = timeStart;
    s.timeEnd = timeEnd;
    s.courseType = courseType;
    s.color = color;

    closeModal('session-modal');
    updateSessionList();
  };
  
  openModal('session-modal');
}

function duplicateSession() {
  if (!selectedSessionId) return;
  const s = DB.sessions.find(x => x.id === selectedSessionId);
  if (!s) return;
  const newSession = { ...s, id: uuid(), createdAt: new Date().toISOString() };
  DB.sessions.push(newSession);
  updateSessionList();
}

function deleteSession() {
  if (!selectedSessionId || !confirm('確定要刪除此活動？')) return;
  DB.sessions = DB.sessions.filter(s => s.id !== selectedSessionId);
  delete DB.records[selectedSessionId];
  updateSessionList();
}

function toggleSessionPopover(e, id) {
  e.stopPropagation();
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('show');
  closeAllSessionPopovers();
  if (!isOpen) { positionPopover(e.currentTarget, el); el.classList.add('show'); }
}

function closeAllSessionPopovers() {
  document.querySelectorAll('.session-popover.show').forEach(p => p.classList.remove('show'));
}

// ============ MEMBERS ============
function updateMembersList() {
  const html = DB.members.map((m, idx) => `
    <div class="member-item">
      <div class="num-badge">${idx + 1}</div>
      <div class="member-info">
        <div class="member-name">⭐ ${esc(m.name)}</div>
        <div class="member-meta">${esc(m.courseType || '神鼓陣')} • ${esc(m.hall || '-')}</div>
      </div>
      ${isAdmin ? `
        <div class="action-group" onclick="event.stopPropagation();">
          <button class="btn btn-sm" onclick="selectedMemberId='${m.id}'; toggleMemberPopover(event, 'member-popover-main')">⋯</button>
        </div>
      ` : ''}
    </div>
  `).join('');
  document.getElementById('members-list').innerHTML = html;
}

function openAddMemberModal() {
  document.getElementById('m-name').value = '';
  document.getElementById('m-course').value = '神鼓陣';
  document.getElementById('m-role').value = '組員';
  document.getElementById('m-hall').value = '';
  document.getElementById('m-id').value = '';
  openModal('member-modal');
}

function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  const courseType = document.getElementById('m-course').value;
  const role = document.getElementById('m-role').value;
  const hall = document.getElementById('m-hall').value.trim();
  const memberId = document.getElementById('m-id').value.trim();

  if (!name) { alert('請填入姓名'); return; }

  const member = { id: uuid(), name, courseType, role, hall, memberId, createdAt: new Date().toISOString() };
  DB.members.push(member);
  closeModal('member-modal');
  updateMembersList();
}

function openEditMemberModal() {
  if (!selectedMemberId) return;
  const m = DB.members.find(x => x.id === selectedMemberId);
  if (!m) return;
  document.getElementById('m-name').value = m.name;
  document.getElementById('m-course').value = m.courseType;
  document.getElementById('m-role').value = m.role;
  document.getElementById('m-hall').value = m.hall;
  document.getElementById('m-id').value = m.memberId;
  
  const saveBtn = document.querySelector('#member-modal .btn-primary');
  saveBtn.onclick = function() {
    const name = document.getElementById('m-name').value.trim();
    const courseType = document.getElementById('m-course').value;
    const role = document.getElementById('m-role').value;
    const hall = document.getElementById('m-hall').value.trim();
    const memberId = document.getElementById('m-id').value.trim();

    if (!name) { alert('請填入姓名'); return; }

    m.name = name;
    m.courseType = courseType;
    m.role = role;
    m.hall = hall;
    m.memberId = memberId;

    closeModal('member-modal');
    updateMembersList();
  };
  
  openModal('member-modal');
}

function deleteMember() {
  if (!selectedMemberId || !confirm('確定要刪除此組員？')) return;
  DB.members = DB.members.filter(m => m.id !== selectedMemberId);
  updateMembersList();
}

function toggleMemberPopover(e, id) {
  e.stopPropagation();
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('show');
  closeAllPopovers();
  if (!isOpen) { positionPopover(e.currentTarget, el); el.classList.add('show'); }
}

function closeAllPopovers() {
  document.querySelectorAll('.member-popover.show').forEach(p => p.classList.remove('show'));
}

document.addEventListener('click', () => { closeAllPopovers(); closeAllSessionPopovers(); });

function positionPopover(btn, el) {
  const rect = btn.getBoundingClientRect();
  const pw = 120;
  let left = rect.right - pw;
  if (left < 8) left = 8;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  el.style.top  = (rect.bottom + 6) + 'px';
  el.style.left = left + 'px';
  el.style.right = 'auto';
}

function importMembers() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(worksheet);
        rows.forEach(row => {
          if (row['姓名'] || row['name']) {
            const member = {
              id: uuid(),
              name: row['姓名'] || row['name'] || '',
              courseType: row['課程'] || row['course'] || '神鼓陣',
              role: row['角色'] || row['role'] || '組員',
              hall: row['組別'] || row['hall'] || '',
              memberId: row['學號'] || row['id'] || '',
              createdAt: new Date().toISOString()
            };
            if (member.name) DB.members.push(member);
          }
        });
        updateMembersList();
        alert('匯入成功！');
      } catch (err) {
        alert('匯入失敗：' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
}

function exportMembers() {
  const data = DB.members.map(m => ({
    '姓名': m.name,
    '課程': m.courseType,
    '角色': m.role,
    '組別': m.hall,
    '學號': m.memberId
  }));
  const worksheet = XLSX.utils.json_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, '組員');
  XLSX.writeFile(workbook, '組員名單.xlsx');
}

// ============ ATTENDANCE ============
function generateAttendanceTabs() {
  const active = DB.sessions.slice(-6).reverse();
  const html = active.map(s => {
    const d = new Date(s.date);
    const label = d.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
    return `<button class="filter-tab" onclick="loadAttendance('${s.id}')">${label}</button>`;
  }).join('');
  document.getElementById('attendance-tabs').innerHTML = html;
  if (active.length > 0) loadAttendance(active[0].id);
}

function loadAttendance(sessionId) {
  const session = DB.sessions.find(s => s.id === sessionId);
  if (!session) return;

  const members = DB.members.filter(m => (m.courseType || '神鼓陣') === (session.courseType || '神鼓陣'));
  const record = DB.records[sessionId] || {};

  const html = members.map((m, idx) => {
    const status = record[m.id] || 'absent';
    return `
      <div class="member-item">
        <div class="num-badge">${idx + 1}</div>
        <div class="member-info">
          <div class="member-name">⭐ ${esc(m.name)}</div>
          <div class="member-meta">${esc(m.courseType || '神鼓陣')}</div>
        </div>
        <div class="action-group" onclick="event.stopPropagation(); toggleAttendanceStatus('${sessionId}', '${m.id}')">
          <span class="status-badge ${status === 'leave' ? 'leave' : ''}" style="
            padding: 6px 12px; border-radius: 10px;
            background: ${status === 'leave' ? 'var(--red-light)' : 'var(--accent-light)'};
            color: ${status === 'leave' ? 'var(--red)' : 'var(--accent)'};
            font-size: 12px; font-weight: 600; cursor: pointer;
          ">${status === 'leave' ? '請假' : '出席'}</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('attendance-content').innerHTML = `<div class="card">${html}</div>`;
}

function toggleAttendanceStatus(sessionId, memberId) {
  if (!DB.records[sessionId]) DB.records[sessionId] = {};
  const current = DB.records[sessionId][memberId] || 'absent';
  DB.records[sessionId][memberId] = current === 'leave' ? 'absent' : 'leave';
  loadAttendance(sessionId);
}

// ============ STATS ============
function updateStats() {
  const year = parseInt(document.getElementById('stats-year').value);
  const course = document.getElementById('stats-course').value;

  const filtered = DB.sessions.filter(s => {
    const d = new Date(s.date);
    return d.getFullYear() === year && (!course || s.courseType === course);
  });

  const memberStats = DB.members.filter(m => !course || m.courseType === course).map(m => {
    let attended = 0, absent = 0;
    filtered.forEach(s => {
      const rec = DB.records[s.id] || {};
      if (rec[m.id] !== undefined) {
        if (rec[m.id] === 'leave') absent++; else attended++;
      }
    });
    return {
      name: m.name,
      courseType: m.courseType,
      attended,
      absent,
      total: attended + absent,
      rate: total > 0 ? Math.round(attended / total * 100) : 0
    };
  });

  const html = `
    <div class="stats-table-wrapper">
      <table class="stats-table">
        <thead>
          <tr>
            <th>姓名</th>
            <th>課程</th>
            <th>活動數</th>
            <th>出席</th>
            <th>缺席</th>
            <th>出席率</th>
          </tr>
        </thead>
        <tbody>
          ${memberStats.map(s => `
            <tr>
              <td style="text-align:left; padding-left:16px;">${esc(s.name)}</td>
              <td>${esc(s.courseType)}</td>
              <td>${s.total}</td>
              <td style="color:var(--accent); font-weight:600;">${s.attended}</td>
              <td style="color:var(--red); font-weight:600;">${s.absent}</td>
              <td style="font-weight:700; color:${s.rate >= 80 ? 'var(--accent)' : 'var(--text2)'};">${s.rate}%</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('stats-content').innerHTML = html;
}

// ============ INIT ============
function initApp() {
  generateMonthTabs();
  updateSessionList();
  updateMembersList();
  generateAttendanceTabs();
  updateStats();
}

function pickSessionColor(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('s-color').value = el.dataset.color;
}

initApp();
</script>
