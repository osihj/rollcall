<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>活動行事曆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f0eb;
    --border: #e6e3dc;
    --text: #2c2a27;
    --text2: #5c5852;
    --text3: #9c968f;
    --accent: #2c5234;
    --accent-light: #f0f4f1;
    --accent2: #b8621d;
    --accent2-light: #faf2eb;
    --accent3: #0f9d58;
    --accent3-light: #e8f5e9;
    --red: #96352b;
    --red-light: #f9ebea;
    --yellow: #b58900;
    --yellow-light: #fbf7eb;
    --blue: #1a73e8;
    --blue-light: #e8eef7;
    --purple: #8e44ad;
    --purple-light: #f3e5f5;
    --radius: 6px;
    --shadow: 0 4px 20px rgba(44,42,39,0.04), 0 1px 3px rgba(44,42,39,0.02);
    --shadow-sm: 0 2px 8px rgba(44,42,39,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }

  /* ── NAV ── */
  nav {
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    width: 100%;
    transform: scale(1);
    transform-origin: bottom center;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-around; gap: 0;
    padding: 8px 0 12px; 
    scrollbar-width: none;
    max-width: 760px; margin: 0 auto;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 0;
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    border: none; background: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.25s ease;
    flex: 1;
    min-width: 0;
    touch-action: manipulation;
  }
  .nav-btn i { 
    display: inline-block;
    font-size: 18px;
    color: var(--text2);
    transition: all 0.25s ease;
    line-height: 1;
  }
  .nav-btn.active i { 
    color: var(--accent); 
  }
  .nav-btn.active { color: var(--accent); font-weight: 600; }

  /* ── PAGES ── */
  .page { display: none; padding: 82px 20px 80px; max-width: 760px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 14px; font-weight: 700;
    color: var(--text); letter-spacing: 0.08em;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title::before {
    content: ''; display: inline-block; width: 3px; height: 14px;
    background: var(--accent); margin-right: 8px; border-radius: 2px;
  }
  .title-text-wrapper { flex: 1; display: flex; align-items: center; }

  /* ── DASHBOARD STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }

    font-size: 28px; font-weight:
