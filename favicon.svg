<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- 背景漸層 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8832D"/>
      <stop offset="100%" stop-color="#A85A18"/>
    </linearGradient>

    <!-- 鼓面 -->
    <linearGradient id="drumTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECECEC"/>
    </linearGradient>

    <!-- 鼓身 -->
    <linearGradient id="drumBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.68"/>
    </linearGradient>

    <!-- 陰影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0"
                    dy="20"
                    stdDeviation="24"
                    flood-color="#000000"
                    flood-opacity="0.22"/>
    </filter>

    <!-- 柔光 -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

  </defs>

  <!-- 背景 -->
  <rect x="40"
        y="40"
        width="944"
        height="944"
        rx="220"
        fill="url(#bg)"/>

  <!-- iOS 光澤 -->
  <ellipse cx="512"
           cy="170"
           rx="360"
           ry="120"
           fill="white"
           opacity="0.08"
           filter="url(#blur)"/>

  <!-- 主圖示 -->
  <g transform="translate(0,40)" filter="url(#shadow)">

    <!-- 鼓棒 -->
    <line x1="390" y1="250"
          x2="634" y2="460"
          stroke="white"
          stroke-width="34"
          stroke-linecap="round"/>

    <line x1="634" y1="250"
          x2="390" y2="460"
          stroke="white"
          stroke-width="34"
          stroke-linecap="round"/>

    <!-- 鼓棒頭 -->
    <circle cx="390" cy="250" r="30" fill="white"/>
    <circle cx="634" cy="250" r="30" fill="white"/>

    <!-- 鼓面 -->
    <ellipse cx="512"
             cy="610"
             rx="285"
             ry="102"
             fill="url(#drumTop)"/>

    <!-- 鼓身（加高版） -->
    <path d="
      M227 610
      L227 800
      Q227 915 512 915
      Q797 915 797 800
      L797 610
    "
    fill="url(#drumBody)"/>

    <!-- 鼓底 -->
    <ellipse cx="512"
             cy="800"
             rx="285"
             ry="95"
             fill="white"
             opacity="0.18"/>

    <!-- 鼓邊 -->
    <ellipse cx="512"
             cy="610"
             rx="285"
             ry="102"
             fill="none"
             stroke="#BE6B22"
             stroke-width="10"/>

    <!-- 鼓面高光 -->
    <ellipse cx="470"
             cy="580"
             rx="160"
             ry="34"
             fill="white"
             opacity="0.16"/>

  </g>

</svg>